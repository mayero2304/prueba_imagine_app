services:
  db:
    image: postgres:16-alpine
    container_name: imagine_support_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-imagine_support}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - imagine_support_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-imagine_support}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: runtime
    container_name: imagine_support_backend
    restart: unless-stopped
    environment:
      APP_NAME: Imagine Support API
      APP_ENV: docker
      API_PREFIX: /api
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/imagine_support
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: imagine_support_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5174}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  imagine_support_postgres_data:
